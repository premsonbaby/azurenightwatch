services:
  api:
    build:
      context: .
      dockerfile: src/backend/NightWatch.Api/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - NightWatch__DemoMode=true
      - Cors__AllowedOrigins__0=http://localhost:5173
      - ConnectionStrings__SqlDatabase=Server=db;Database=NightWatch;User Id=sa;Password=NightWatch_Dev123!;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nightwatch

  web:
    build:
      context: src/frontend/nightwatch-web
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:5000
    ports:
      - "5173:80"
    networks:
      - nightwatch

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=NightWatch_Dev123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NightWatch_Dev123!' -Q 'SELECT 1' -C -b"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nightwatch

volumes:
  sqldata:

networks:
  nightwatch:
    driver: bridge
