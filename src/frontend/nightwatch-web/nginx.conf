server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy all API calls to the backend container.
    # Using Docker's embedded resolver so the hostname is looked up at
    # request time rather than nginx startup, avoiding failures if the api
    # container isn't ready yet.
    location /api {
        resolver 127.0.0.11 valid=30s;
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # SPA fallback — all other routes handled by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
